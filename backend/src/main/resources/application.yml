server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/timo_words?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  mail:
    host: ${MAIL_SMTP_HOST:smtp.qq.com}
    port: ${MAIL_SMTP_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# 自定义 SMTP 覆盖（用于阿里云邮件推送 DirectMail 等，非 spring.mail 前缀）
custom:
  mail:
    smtp:
      host: ${MAIL_SMTP_HOST:}
      port: ${MAIL_SMTP_PORT:465}
      ssl: ${MAIL_SMTP_SSL:true}

# JWT
jwt:
  secret: ${JWT_SECRET:timo-words-dev-secret-key-2026-secure-256bits!!}
  expiration: 604800000  # 7 days in milliseconds

# DeepSeek AI
deepseek:
  api-key: ${DEEPSEEK_API_KEY:your-api-key-here}
  base-url: https://api.deepseek.com
  model: deepseek-v4-flash
  max-tokens: 2048
  temperature: 0.7

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: true
  setting:
    language: zh_cn
